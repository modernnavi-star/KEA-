<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KEA Group C Exam Prep</title>
<style>
:root{--bg:#faf7f0;--card:#fff;--txt:#1a0f05;--tx2:#6b5e4e;--tx3:#9e8d78;--bd:#e5dccf;--ac:#d4782f;--gr:#2e7d32;--rd:#c62828;--sh:0 1px 3px rgba(0,0,0,.06)}
[data-theme=dark]{--bg:#1a1a1a;--card:#252525;--txt:#e8e8e8;--tx2:#aaa;--tx3:#777;--bd:#3a3a3a}

*{margin:0;padding:0;box-sizing:border-box}
html{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt)}
body{min-height:100vh;min-height:100dvh;padding-bottom:72px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
header h1{font-size:1rem;font-weight:700;flex:1}
header button{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;color:var(--txt)}
header button:hover{background:#f5f0e5}
.btn-icon{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;color:var(--txt)}

/* MAIN */
main{max-width:640px;margin:0 auto;padding:12px 14px}

/* CARDS */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--sh);border:1px solid var(--bd)}
.card h2{font-size:1.05rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card h3{font-size:.95rem;margin-bottom:6px}
.card-accent{border-left:4px solid var(--ac)}
.card-green{border-left:4px solid var(--gr)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--card);border-radius:10px;padding:12px;text-align:center;box-shadow:var(--sh);border:1px solid var(--bd)}
.stat .val{font-size:1.5rem;font-weight:800;color:var(--ac)}
.stat .lbl{font-size:.68rem;color:var(--tx3);margin-top:2px}

/* PROGRESS */
.prog-wrap{margin:8px 0}
.prog-row{display:flex;justify-content:space-between;font-size:.75rem;color:var(--tx2);margin-bottom:3px}
.prog-bar{height:8px;background:#e8dcc8;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--gr);border-radius:4px;transition:width .5s}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:20px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.btn-pr{background:var(--ac);color:#fff}
.btn-pr:hover{filter:brightness(1.1)}
.btn-gr{background:var(--gr);color:#fff}
.btn-gr:hover{filter:brightness(1.1)}
.btn-rd{background:var(--rd);color:#fff}
.btn-out{background:transparent;border:2px solid var(--ac);color:var(--ac)}
.btn-out:hover{background:var(--ac);color:#fff}
.btn-gh{background:transparent;border:1px solid var(--bd);color:var(--txt)}
.btn-gh:hover{background:#f5f0e5}

/* DAY GRID */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.day{background:var(--card);border:2px solid var(--bd);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.day:hover:not(.locked){border-color:var(--ac);transform:translateY(-2px)}
.day.done{border-color:var(--gr);background:var(--gr);color:#fff}
.day.today{border-color:var(--ac);box-shadow:0 0 0 3px rgba(212,120,47,.2)}
.day.locked{opacity:.4;cursor:not-allowed;background:#f0ece4}
.day .dn{font-size:1.2rem;font-weight:800;color:var(--ac)}
.day.done .dn{color:#fff}
.day .dl{font-size:.65rem;color:var(--tx3);margin-top:2px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.day.done .dl{color:rgba(255,255,255,.8)}
.day .db{position:absolute;top:3px;right:5px;font-size:.6rem;font-weight:700}
.day.locked::after{content:'🔒';position:absolute;top:3px;right:5px;font-size:.7rem}

/* TOPIC LIST */
.topic{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#faf7f0;border-radius:8px;margin-bottom:5px;cursor:pointer;border-left:3px solid var(--ac);transition:all .15s;font-size:.85rem}
.topic:hover{transform:translateX(3px)}
.topic .ts{font-size:.7rem;color:var(--tx3)}

/* QUIZ */
.qp{height:4px;background:#e8dcc8;border-radius:2px;margin-bottom:12px}
.qpf{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.qq{font-size:1rem;font-weight:600;margin-bottom:12px;line-height:1.5}
.qo{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:1px solid var(--bd);background:var(--card);cursor:pointer;font-size:.88rem;transition:all .15s;font-family:inherit}
.qo:hover:not(:disabled){border-color:var(--ac)}
.qo.sel{border-color:var(--ac);background:#fff3e0;font-weight:600}
.qo.correct{border-color:var(--gr);background:#e8f5e9;color:var(--gr)}
.qo.wrong{border-color:var(--rd);background:#ffebee;color:var(--rd)}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s;padding:16px}
.modal-bg.show{opacity:1;visibility:visible}
.modal-box{background:var(--card);border-radius:16px;padding:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);position:relative}
.modal-box .close{position:absolute;top:8px;right:12px;font-size:1.3rem;background:none;border:none;cursor:pointer;color:var(--tx3)}
.modal-box h2{font-size:1.1rem;margin-bottom:8px;color:var(--ac)}
.modal-box .lesson{line-height:1.75;font-size:.88rem;white-space:pre-line}
.modal-box .lesson h3{font-size:.95rem;margin:14px 0 4px;color:var(--ac)}
.modal-box .lesson b,.modal-box .lesson strong{color:var(--ac)}

/* FORCE MODAL */
.force-bg{position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .3s;padding:16px}
.force-bg.show{opacity:1;visibility:visible}
.force-box{background:var(--card);border-radius:20px;padding:28px 22px;text-align:center;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.force-box .ficon{font-size:3rem;margin-bottom:10px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.force-box h2{font-size:1.15rem;margin-bottom:6px}
.force-box p{color:var(--tx2);font-size:.88rem;margin-bottom:18px}
.force-box .fbtn{display:flex;flex-direction:column;gap:8px}

/* TOAST */
.toast-fix{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:2000;pointer-events:none}
.toast-msg{background:#333;color:#fff;padding:10px 22px;border-radius:24px;font-size:.82rem;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:ti .3s,to .3s 2.2s forwards;white-space:nowrap}
@keyframes ti{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes to{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);display:flex;z-index:50;height:64px;box-shadow:0 -1px 4px rgba(0,0,0,.08)}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx3);text-decoration:none;font-size:.65rem;font-weight:500;gap:2px;transition:all .15s;border:none;background:none;cursor:pointer;font-family:inherit}
.bnav a .bi{font-size:1.2rem}
.bnav a.active{color:var(--ac)}

/* COUNTDOWN BADGE */
.cd-badge{background:linear-gradient(135deg,var(--ac),#b85c1e);color:#fff;border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:700}

/* NEWS */
.nw{background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:6px;border:1px solid var(--bd)}
.nw .nd{font-size:.68rem;color:var(--tx3)}
.nw .nt{font-size:.88rem;font-weight:600;margin:3px 0}
.nw .nb{font-size:.78rem;color:var(--tx2)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.62rem;font-weight:600;margin-right:4px}
.tag.na{background:#e3f2fd;color:#1565c0}
.tag.st{background:#fff3e0;color:#e65100}
.tag.sc{background:#e8f5e9;color:#2e7d32}
.tag.ex{background:#fce4ec;color:#c62828}

.result{text-align:center;padding:20px}
.result .ri{font-size:3rem;margin-bottom:6px}
.result .rs{font-size:2.2rem;font-weight:800;color:var(--ac)}

/* EMPTY */
.empty{text-align:center;padding:30px;color:var(--tx3)}
.empty .ei{font-size:3rem;margin-bottom:8px}

/* SIDEBAR DRAWER */
.drawer-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:all .25s}
.drawer-bg.show{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;left:0;bottom:0;width:275px;z-index:201;background:var(--card);transform:translateX(-100%);transition:transform .25s;overflow-y:auto;box-shadow:2px 0 16px rgba(0,0,0,.1)}
.drawer.show{transform:translateX(0)}
.drawer .dh{padding:16px;text-align:center}
.drawer .dn{padding:4px}
.drawer .dn a{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;text-decoration:none;color:var(--txt);font-size:.84rem;transition:all .15s}
.drawer .dn a:hover{background:#f5f0e5}
.drawer .dn a.active{background:var(--ac);color:#fff}
.drawer .df{padding:12px;text-align:center;font-size:.7rem;color:var(--tx3);border-top:1px solid var(--bd)}

[data-lang=en] [kl],[data-lang=kn] [el]{display:none}
</style>
</head>
<body>

<!-- DRAWER -->
<div class="drawer-bg" id="dbg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dh"><div class="cd-badge" id="cdBadge">📅 -- days</div></div>
  <div class="dn" id="drawerNav"></div>
  <div class="df"><button class="btn btn-gh" style="font-size:.7rem;width:100%" onclick="resetAll()">🔄 <kl>ಮರುಹೊಂದಿಸಿ</kl><el>Reset Progress</el></button></div>
</div>

<!-- HEADER -->
<header>
  <button onclick="openDrawer()">☰</button>
  <h1><kl>📚 KEA ತಯಾರಿ</kl><el>📚 KEA Prep</el></h1>
  <button onclick="toggleLang()">🔤</button>
  <button onclick="toggleTheme()" id="themeBtn">🌓</button>
</header>

<!-- MAIN -->
<main id="main"></main>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal-box" id="modalBox"></div></div>

<!-- FORCE MODAL -->
<div class="force-bg" id="forceBg"><div class="force-box">
  <div class="ficon">⏰</div>
  <h2><kl>ಇಂದಿನ ಅಧ್ಯಯನ ಸಮಯ!</kl><el>Study Time!</el></h2>
  <p id="forceTxt"></p>
  <div class="fbtn">
    <button class="btn btn-pr" style="width:100%;justify-content:center;padding:12px" onclick="studyNow()">📖 <kl>ಈಗ ಅಧ್ಯಯನ ಮಾಡಿ</kl><el>Study Now</el></button>
    <button class="btn btn-out" style="width:100%;justify-content:center" id="ppBtn" onclick="postpone()">⏳ <kl>ಮುಂದೂಡಿ</kl><el>Postpone</el></button>
  </div>
  <p style="font-size:.7rem;color:var(--rd);margin-top:8px" id="ppWarn"></p>
</div></div>

<!-- TOAST -->
<div class="toast-fix" id="toastFix"></div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav"></nav>

<script>
// ============ DATA ============
const EXAM=new Date('2026-10-04T00:00:00+05:30');
const LS='kea3';

const PLAN=[
  {d:1,s:'constitution',kn:'ಸಂವಿಧಾನ - ಪೀಠಿಕೆ, ಮೂಲ ಹಕ್ಕುಗಳು, DPSP',en:'Constitution - Preamble, FRs, DPSP',ts:['constitution_preamble','fundamental_rights','dpsp'],p:1},
  {d:2,s:'constitution',kn:'ಸಂವಿಧಾನ - ತಿದ್ದುಪಡಿಗಳು, ನ್ಯಾಯಾಂಗ, ರಾಜ್ಯ ಸರ್ಕಾರ',en:'Constitution - Amendments, Judiciary, State',ts:['amendments','judiciary','state_admin'],p:1},
  {d:3,s:'history',kn:'ಭಾರತ ಇತಿಹಾಸ - ಪ್ರಾಚೀನ & ಮಧ್ಯಕಾಲೀನ',en:'Indian History - Ancient & Medieval',ts:['ancient_india','medieval_india'],p:1},
  {d:4,s:'history',kn:'ಕರ್ನಾಟಕ ಇತಿಹಾಸ - ಕದಂಬರಿಂದ ವಿಜಯನಗರದವರೆಗೆ',en:'Karnataka History - Kadambas to Vijayanagara',ts:['ancient_karnataka','medieval_karnataka'],p:1},
  {d:5,s:'history',kn:'ಆಧುನಿಕ ಭಾರತ, ಟಿಪ್ಪು, ಚೆನ್ನಮ್ಮ, ಸ್ವಾತಂತ್ರ್ಯ',en:'Modern India, Tipu, Chennamma, Freedom',ts:['modern_india','tipu_kittur','freedom_karnataka'],p:1},
  {d:6,s:'geography',kn:'ಭಾರತ ಭೂಗೋಳ - ಭೌತಿಕ ಲಕ್ಷಣ, ನದಿಗಳು',en:'India Geography - Physical, Rivers',ts:['physical_india','rivers_india'],p:1},
  {d:7,s:'geography',kn:'ಕರ್ನಾಟಕ ಭೂಗೋಳ - ನದಿಗಳು, ಜಿಲ್ಲೆಗಳು',en:'KA Geography - Rivers, Districts',ts:['karnataka_rivers','karnataka_districts','karnataka_climate'],p:1},
  {d:8,s:'admin',kn:'ಆಡಳಿತ - ರಾಜ್ಯ, ಪ್ರಾದೇಶಿಕ, ಗ್ರಾಮ ಲೆಕ್ಕಾಧಿಕಾರಿ',en:'Administration - State, Territorial, VA Role',ts:['state_admin','territorial_admin'],p:1},
  {d:9,s:'rural',kn:'ಪಂಚಾಯತ್ ರಾಜ್, ಗ್ರಾಮೀಣಾಭಿವೃದ್ಧಿ, ಸಹಕಾರ',en:'Panchayat Raj, Rural Dev, Cooperatives',ts:['panchayat_raj','rural_dev','coop_societies'],p:1},
  {d:10,s:'economy',kn:'ಕರ್ನಾಟಕ ಆರ್ಥಿಕತೆ, ಸರ್ಕಾರಿ ಯೋಜನೆಗಳು',en:'KA Economy, Govt Schemes',ts:['karnataka_economy','govt_schemes'],p:1},
  {d:11,s:'environment',kn:'ಪರಿಸರ, ಜೀವವೈವಿಧ್ಯ, ಕರ್ನಾಟಕ ಅಭಿವೃದ್ಧಿ',en:'Environment, Biodiversity, KA Dev',ts:['environment','biodiversity_karnataka'],p:1},
  {d:12,s:'current',kn:'ಪ್ರಚಲಿತ ಘಟನೆಗಳು - ರಾಷ್ಟ್ರೀಯ & ಅಂತರರಾಷ್ಟ್ರೀಯ',en:'Current Affairs - National & International',ts:['current_affairs'],p:1},
  {d:13,s:'kannada',kn:'ಸಾಮಾನ್ಯ ಕನ್ನಡ - ವ್ಯಾಕರಣ, ಶಬ್ದಕೋಶ, ಗಾದೆಗಳು',en:'Kannada - Grammar, Vocab, Proverbs',ts:['kannada_grammar','kannada_vocab','kannada_proverbs'],p:2},
  {d:14,s:'kannada',kn:'ಕನ್ನಡ - ಗ್ರಹಿಕೆ, ಅನುವಾದ',en:'Kannada - Comprehension, Translation',ts:['kannada_comprehension','kannada_translation'],p:2},
  {d:15,s:'english',kn:'ಇಂಗ್ಲಿಷ್ - ವ್ಯಾಕರಣ, ದೋಷ, ಶಬ್ದಕೋಶ, idioms',en:'English - Grammar, Errors, Vocab, Idioms',ts:['english_grammar','english_errors','english_synonyms','english_idioms','english_comprehension'],p:2},
  {d:16,s:'computer',kn:'ಕಂಪ್ಯೂಟರ್ - ಮೂಲಭೂತ, MS Office, ಇಂಟರ್ನೆಟ್',en:'Computer - Basics, MS Office, Internet',ts:['computer_basics','ms_office','internet_email','computer_advanced'],p:2},
];

const SUBJECTS={
  constitution:{kn:'ಸಂವಿಧಾನ',en:'Constitution',p:1,ts:['constitution_preamble','fundamental_rights','dpsp','amendments','judiciary']},
  history:{kn:'ಇತಿಹಾಸ',en:'History',p:1,ts:['ancient_india','medieval_india','ancient_karnataka','medieval_karnataka','tipu_kittur','modern_india','freedom_karnataka']},
  geography:{kn:'ಭೂಗೋಳ',en:'Geography',p:1,ts:['physical_india','rivers_india','karnataka_rivers','karnataka_districts','karnataka_climate']},
  admin:{kn:'ಆಡಳಿತ',en:'Administration',p:1,ts:['state_admin','territorial_admin']},
  rural:{kn:'ಪಂಚಾಯತ್ ರಾಜ್',en:'Panchayat Raj',p:1,ts:['panchayat_raj','rural_dev','coop_societies']},
  economy:{kn:'ಆರ್ಥಿಕತೆ',en:'Economy',p:1,ts:['karnataka_economy','govt_schemes']},
  environment:{kn:'ಪರಿಸರ',en:'Environment',p:1,ts:['environment','biodiversity_karnataka']},
  current:{kn:'ಪ್ರಚಲಿತ ಘಟನೆಗಳು',en:'Current Affairs',p:1,ts:['current_affairs']},
  kannada:{kn:'ಸಾಮಾನ್ಯ ಕನ್ನಡ',en:'Kannada',p:2,ts:['kannada_grammar','kannada_vocab','kannada_proverbs','kannada_comprehension','kannada_translation']},
  english:{kn:'ಸಾಮಾನ್ಯ ಇಂಗ್ಲಿಷ್',en:'English',p:2,ts:['english_grammar','english_errors','english_synonyms','english_idioms','english_comprehension']},
  computer:{kn:'ಕಂಪ್ಯೂಟರ್ ಜ್ಞಾನ',en:'Computer',p:2,ts:['computer_basics','ms_office','internet_email','computer_advanced']},
};

// ============ STATE ============
let S, quiz=null, ppTimer=null;

function defS(){
  return {lang:'kn',theme:'light',cd:1,done:{},tp:{},scores:[],ppToday:0,ppDate:null,la:new Date().toISOString()};
}
function loadS(){
  try{let r=localStorage.getItem(LS);if(r){let s=JSON.parse(r);let d=defS();for(let k of Object.keys(d))if(!(k in s))s[k]=d[k];let td=new Date().toISOString().slice(0,10);if(s.ppDate!==td){s.ppToday=0;s.ppDate=td}return s}}catch(e){}
  return defS();
}
function saveS(){S.la=new Date().toISOString();try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){}}
function L(){return S.lang}
function T(kn,en){return L()==='kn'?kn:en}

// ============ INIT ============
S=loadS();
document.documentElement.setAttribute('data-lang',S.lang);
document.documentElement.setAttribute('data-theme',S.theme);
updateCD();
renderAll();
checkForce();
setInterval(updateCD,60000);
setInterval(checkForce,300000);

// ============ HELPERS ============
function updateCD(){
  let d=Math.max(0,Math.ceil((EXAM-new Date())/(86400000)));
  document.getElementById('cdBadge').textContent='📅 '+d+' '+(L()==='kn'?'ದಿನಗಳು':'days');
}
function getToday(){let d=Object.keys(S.done).length;S.cd=Math.min(d+1,16);return S.cd}
function toast(m){
  let c=document.getElementById('toastFix');let e=document.createElement('div');e.className='toast-msg';e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),2500);
}
function toggleLang(){S.lang=S.lang==='kn'?'en':'kn';document.documentElement.setAttribute('data-lang',S.lang);saveS();renderAll();toast(T('ಭಾಷೆ ಬದಲಾಯಿಸಲಾಗಿದೆ','Language changed'));}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeBtn').textContent=S.theme==='dark'?'☀️':'🌓';saveS();}
function resetAll(){if(confirm(T('ಪ್ರಗತಿ ಅಳಿಸುವುದೇ?','Reset all progress?'))){S=defS();S.lang=L();S.theme=document.documentElement.getAttribute('data-theme')||'light';saveS();renderAll();toast('🔄 '+T('ಮರುಹೊಂದಿಸಲಾಗಿದೆ','Reset done'))}}

// ============ DRAWER ============

function navigate(id){
  closeDrawer();
  document.querySelectorAll('.bnav a, .drawer .dn a').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll(`[data-nav="${id}"]`).forEach(e=>e.classList.add('active'));
  let m=document.getElementById('main');
  switch(id){
    case 'home':renderHome(m);break;
    case 'plan':renderPlan(m);break;
    case 'topics':renderTopics(m);break;
    case 'quiz':renderQuiz(m);break;
    case 'news':renderNews(m);break;
    case 'p1':renderPaper(m,1);break;
    case 'p2':renderPaper(m,2);break;
    default:renderHome(m);
  }
  m.scrollTop=0;
}

function renderQuiz(m){
  if(quiz){renderQQ(m);return}
  let td=getToday();
  m.innerHTML=`<div class="card"><h2>📝 ${T('ಕ್ವಿಜ್','Quiz')}</h2><div style="display:flex;flex-wrap:wrap;gap:6px">
    <button class="btn btn-pr" onclick="quizDay(${td})">🎯 ${T('ಇಂದಿನ ಕ್ವಿಜ್','Today Quiz')}</button>
    <button class="btn btn-out" onclick="fullMock()">🔥 ${T('ಮಾಕ್ ಟೆಸ್ಟ್','Mock Test')}</button>
  </div><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">${Object.entries(SUBJECTS).map(([sk,sg])=>`<button class="btn btn-gh" style="font-size:.75rem" onclick="quizSubject('${sk}')">${T(sg.kn,sg.en)}</button>`).join('')}</div></div>`;
}
function quizDay(day){let p=PLAN.find(d=>d.d===day);if(p)startQuiz(p.ts,T('ದಿನ '+day,'Day '+day),day)}
function quizSubject(sk){let sg=SUBJECTS[sk];if(sg)startQuiz(sg.ts,T(sg.kn,sg.en),null)}
function quizTopic(tid){startQuiz([tid],T(TOPICS[tid].kn||'',TOPICS[tid].en||''),null)}
function fullMock(){let ids=Object.keys(TOPICS).sort(()=>Math.random()-.5);startQuiz(ids.slice(0,20),T('ಮಾಕ್ ಟೆಸ್ಟ್','Mock Test'),null)}
function startQuiz(ids,title,day){
  let qs=[];
  for(let tid of ids){if(QBANK[tid])for(let q of QBANK[tid])qs.push({...q,tid})}
  if(qs.length===0){toast(T('ಪ್ರಶ್ನೆಗಳಿಲ್ಲ','No questions'));return}
  qs=qs.sort(()=>Math.random()-.5).slice(0,Math.min(25,qs.length));
  quiz={title,questions:qs,idx:0,score:0,ans:[],tids:ids,day};navigate('quiz')
}
function renderQQ(m){
  let qs=quiz,q=qs.questions[qs.idx],last=qs.idx===qs.questions.length-1;
  let pct=qs.idx/qs.questions.length*100,aw=qs.ans[qs.idx]!==undefined;
  let opts=L()==='kn'?q.o_kn:q.o_en;
  m.innerHTML=`<div class="card">
    <div class="qp"><div class="qpf" style="width:${pct}%"></div></div>
    <h2>📝 ${qs.title}</h2>
    <p style="font-size:.8rem;color:var(--tx2)">${T('ಪ್ರಶ್ನೆ','Q')} ${qs.idx+1}/${qs.questions.length} | ${T('ಸ್ಕೋರ್','Score')}: ${qs.score}</p>
    <div class="qq">${L()==='kn'?q.q_kn:q.q_en}</div>
    ${opts.map((o,i)=>{let c='qo';if(aw){if(i===q.ans)c+=' correct';if(i===qs.ans[qs.idx]&&i!==q.ans)c+=' wrong'}return`<button class="${c}" onclick="answerQ(${i})" ${aw?'disabled':''}>${String.fromCharCode(65+i)}. ${o}</button>`}).join('')}
    <div style="margin-top:10px;display:flex;gap:6px">
      ${aw&&!last?`<button class="btn btn-pr" onclick="nextQ()">${T('ಮುಂದಿನ','Next')} →</button>`:''}
      ${aw&&last?`<button class="btn btn-gr" onclick="finishQ()">🏆 ${T('ಫಲಿತಾಂಶ','Result')}</button>`:''}
      <button class="btn btn-gh" onclick="quiz=null;navigate('quiz')">${T('ರದ್ದು','Cancel')}</button>
    </div></div>`;
}
function answerQ(i){if(!quiz||quiz.ans[quiz.idx]!==undefined)return;let q=quiz.questions[quiz.idx];quiz.ans[quiz.idx]=i;if(i===q.ans)quiz.score++;saveS();renderQQ(document.getElementById('main'))}
function nextQ(){if(!quiz)return;quiz.idx++;renderQQ(document.getElementById('main'));document.getElementById('main').scrollTop=0}
function finishQ(){
  if(!quiz)return;
  let qs=quiz,t=qs.questions.length,s=qs.score,pct=Math.round(s/t*100),pass=pct>=60;
  for(let tid of qs.tids){if(!S.tp[tid])S.tp[tid]={};S.tp[tid].qd=true;S.tp[tid].qs=pct}
  S.scores.push({d:new Date().toISOString().slice(0,10),nm:qs.title,s,t});
  if(pass&&qs.day&&qs.day===getToday()&&!S.done[qs.day]){S.done[qs.day]=true;S.ppToday=0}
  saveS();getToday();let em=pct>=80?'🎉':pct>=60?'👍':pct>=40?'📚':'💪';
  let m=document.getElementById('main');
  m.innerHTML=`<div class="card"><div class="result"><div class="ri">${em}</div><div class="rs">${s}/${t}</div><p style="color:var(--tx2)">${pct}% — ${pass?T('✅ ಉತ್ತೀರ್ಣ!','✅ Passed!'):T('❌ 60%+ ಬೇಕು','❌ Need 60%+')}</p></div><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap"><button class="btn btn-pr" onclick="quizDay(${getToday()})">🔄 ${T('ಮರುಪ್ರಯತ್ನ','Retry')}</button><button class="btn btn-out" onclick="navigate('plan')">📅 ${T('ಯೋಜನೆ','Plan')}</button><button class="btn btn-out" onclick="quiz=null;navigate('quiz')">📋 ${T('ಬೇರೆ ಕ್ವಿಜ್','More')}</button></div></div>`;
  quiz=null;
}

// ============ FORCE LEARNING ============
function checkForce(){
  let td=new Date().toISOString().slice(0,10);
  if(S.ppDate!==td){S.ppToday=0;S.ppDate=td;saveS()}
  if(quiz)return;
  let cd=getToday();if(cd>16||S.done[cd])return;
  let h=new Date().getHours();
  if(![9,14,19,22].includes(h))return;
  if(S.ppToday>=3)return;
  showForce();
}
function showForce(){
  let p=PLAN.find(d=>d.d===getToday());if(!p)return;
  document.getElementById('forceTxt').innerHTML=`<strong>${T('ದಿನ '+getToday(),'Day '+getToday())}:</strong> ${T(p.kn,p.en)}<br><span style="color:var(--tx2)">${T('ಪ್ರತಿದಿನ ಅಧ್ಯಯನ ಮಾಡಿ!','Study every day!')}</span>`;
  document.getElementById('ppWarn').textContent=S.ppToday>=2?T('⚠️ ಕೊನೆಯ ಮುಂದೂಡಿಕೆ!','⚠️ Last postpone!'):'';
  let b=document.getElementById('ppBtn');
  if(S.ppToday>=2){b.style.opacity='.5';b.innerHTML='⏰ '+T('ಮುಂದೂಡಲಾಗದು','Cannot postpone');b.disabled=true}
  else{b.style.opacity='1';b.innerHTML='⏳ '+T('ಮುಂದೂಡಿ','Postpone');b.disabled=false}
  document.getElementById('forceBg').classList.add('show');
}
function closeForce(){document.getElementById('forceBg').classList.remove('show')}
function postpone(){
  S.ppToday++;S.ppDate=new Date().toISOString().slice(0,10);saveS();closeForce();
  let min=S.ppToday===1?120:60;
  toast(T(`⏰ ${min} ನಿಮಿಷಗಳ ನಂತರ ನೆನಪಿಸಲಾಗುವುದು`,`⏰ Reminder in ${min} min`));
  if(ppTimer)clearTimeout(ppTimer);
  ppTimer=setTimeout(()=>{if(!S.done[getToday()])showForce()},min*60000);
}

constitution_preamble:{kn:'ಸಂವಿಧಾನದ ಪೀಠಿಕೆ',en:'Constitution Preamble',
kl:'📜 **ಭಾರತದ ಸಂವಿಧಾನದ ಪೀಠಿಕೆ** — ಸಂವಿಧಾನದ ಆತ್ಮ. ನ. 26, 1949 ಅಂಗೀಕಾರ; ಜ. 26, 1950 ಜಾರಿ.\n**ಪೀಠಿಕೆಯ ಪದಗಳು:** ಸಾರ್ವಭೌಮ, ಸಮಾಜವಾದಿ (42ನೇ ತಿದ್ದುಪಡಿ 1976), ಜಾತ್ಯತೀತ (42ನೇ), ಪ್ರಜಾಸತ್ತಾತ್ಮಕ, ಗಣರಾಜ್ಯ.\n**ಉದ್ದೇಶಗಳು:** ನ್ಯಾಯ (ಸಾಮಾಜಿಕ, ಆರ್ಥಿಕ, ರಾಜಕೀಯ), ಸ್ವಾತಂತ್ರ್ಯ, ಸಮಾನತೆ, ಭ್ರಾತೃತ್ವ.\n**ಸಂಗತಿಗಳು:** ಸಂವಿಧಾನ ಸಭೆ ಅಧ್ಯಕ್ಷ: ಡಾ. ರಾಜೇಂದ್ರ ಪ್ರಸಾದ್. ಕರಡು ಸಮಿತಿ: ಡಾ. ಅಂಬೇಡ್ಕರ್. ರಚನೆ: 2 ವರ್ಷ 11 ತಿಂಗಳು 18 ದಿನ. ಕೇಶವಾನಂದ ಭಾರತಿ (1973): ಪೀಠಿಕೆ ಸಂವಿಧಾನದ ಭಾಗ. ಮೂಲ: 22 ಭಾಗ, 395 ಅನುಚ್ಛೇದ, 12 ಅನುಸೂಚಿ.',

fundamental_rights:{kn:'ಮೂಲಭೂತ ಹಕ್ಕುಗಳು',en:'Fundamental Rights',
