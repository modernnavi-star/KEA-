<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEA Group C Prep</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#faf7f0;color:#1a0f05;padding-bottom:80px}
header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e5dccf;padding:8px 12px;display:flex;align-items:center;gap:8px}
header h1{font-size:1rem;flex:1}
header button{width:36px;height:36px;border-radius:50%;border:none;background:transparent;font-size:1.2rem;cursor:pointer}
#main{padding:12px;max-width:640px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e5dccf}
.card h2{font-size:1rem;margin-bottom:8px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat{background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid #e5dccf}
.stat .v{font-size:1.4rem;font-weight:800;color:#d4782f}
.stat .l{font-size:.65rem;color:#9e8d78}
.btn{display:inline-block;padding:8px 16px;border-radius:20px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;margin:3px}
.btn-p{background:#d4782f;color:#fff}
.btn-g{background:#2e7d32;color:#fff}
.btn-o{background:transparent;border:2px solid #d4782f;color:#d4782f}
.btn-h{background:transparent;border:1px solid #e5dccf;color:#1a0f05}
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px}
.day{background:#fff;border:2px solid #e5dccf;border-radius:10px;padding:8px;text-align:center;cursor:pointer}
.day.done{border-color:#2e7d32;background:#2e7d32;color:#fff}
.day.now{border-color:#d4782f;box-shadow:0 0 0 3px rgba(212,120,47,.2)}
.day.lock{opacity:.4;pointer-events:none}
.day .dn{font-size:1.1rem;font-weight:800}
.day .dl{font-size:.6rem;color:#9e8d78;margin-top:3px;line-height:1.2}
.day.done .dl{color:rgba(255,255,255,.8)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center;padding:16px}
.modal.on{display:flex}
.modal .box{background:#fff;border-radius:16px;padding:18px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal .box .x{position:absolute;top:8px;right:12px;font-size:1.2rem;background:none;border:none;cursor:pointer}
.lesson{line-height:1.7;font-size:.85rem;white-space:pre-line}
.lesson b,.lesson strong{color:#d4782f}
.qp{height:4px;background:#e8dcc8;border-radius:2px;margin-bottom:10px}
.qpf{height:100%;background:#d4782f;border-radius:2px}
.qq{font-size:.95rem;font-weight:600;margin:8px 0}
.qo{display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:5px;border-radius:8px;border:1px solid #e5dccf;background:#fff;cursor:pointer;font-size:.85rem;font-family:inherit}
.qo:hover:not(:disabled){border-color:#d4782f}
.qo.correct{border-color:#2e7d32;background:#e8f5e9;color:#2e7d32}
.qo.wrong{border-color:#c62828;background:#ffebee;color:#c62828}
.qo:disabled{opacity:.85}
.topic-btn{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#faf7f0;border-radius:8px;margin-bottom:4px;cursor:pointer;border-left:3px solid #d4782f;font-size:.85rem}
.topic-btn:hover{transform:translateX(3px)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5dccf;display:flex;z-index:50;height:60px}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:none;font-size:.6rem;color:#9e8d78;cursor:pointer;font-family:inherit;gap:2px}
.bnav button .bi{font-size:1.1rem}
.bnav button.on{color:#d4782f}
.force-bg{position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px}
.force-bg.on{display:flex}
.force-box{background:#fff;border-radius:20px;padding:24px;text-align:center;max-width:350px;width:100%}
.force-box .fi{font-size:3rem;margin-bottom:8px}
.force-box h2{font-size:1.1rem;margin-bottom:6px}
.force-box p{color:#6b5e4e;font-size:.85rem;margin-bottom:14px}
.toast-fixed{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:2000;pointer-events:none}
.toast-msg{background:#333;color:#fff;padding:9px 20px;border-radius:20px;font-size:.8rem;animation:fadeIn .3s,fadeOut .3s 2s forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.nw{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:6px;border:1px solid #e5dccf}
.nw .nd{font-size:.65rem;color:#9e8d78}
.nw .nt{font-weight:600;margin:3px 0;font-size:.85rem}
.nw .nb{font-size:.75rem;color:#6b5e4e}
.tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:.6rem;font-weight:600;margin-right:4px}
.tag.na{background:#e3f2fd;color:#1565c0}
.tag.st{background:#fff3e0;color:#e65100}
.tag.sc{background:#e8f5e9;color:#2e7d32}
.tag.ex{background:#fce4ec;color:#c62828}
[data-lang=en] [kl]{display:none}
[data-lang=kn] [el]{display:none}
</style>
</head>
<body>

<header>
  <button onclick="toggleLang()">🔤</button>
  <h1><kl>📚 KEA ತಯಾರಿ</kl><el>📚 KEA Prep</el></h1>
  <span id="cdBadge" style="background:#d4782f;color:#fff;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:700">📅 --</span>
</header>

<div id="main"></div>

<div class="modal" id="lessonModal"><div class="box" id="lessonBox"></div></div>
<div class="modal" id="quizModal"><div class="box" id="quizBox"></div></div>

<div class="force-bg" id="forceBg"><div class="force-box" id="forceBox"></div></div>

<div class="toast-fixed" id="toastFix"></div>

<nav class="bnav">
  <button onclick="nav('home')" class="on" id="bnHome"><span class="bi">🏠</span><kl>ಡ್ಯಾಶ್</kl><el>Home</el></button>
  <button onclick="nav('plan')" id="bnPlan"><span class="bi">📅</span><kl>ಯೋಜನೆ</kl><el>Plan</el></button>
  <button onclick="nav('quiz')" id="bnQuiz"><span class="bi">📝</span><kl>ಕ್ವಿಜ್</kl><el>Quiz</el></button>
  <button onclick="nav('topics')" id="bnTopics"><span class="bi">📖</span><kl>ಪಾಠ</kl><el>Topics</el></button>
  <button onclick="nav('news')" id="bnNews"><span class="bi">📰</span><kl>ಸುದ್ದಿ</kl><el>News</el></button>
</nav>

<script>
// ============ EXAM DATE ============
const EXAM_DATE = new Date('2026-10-04T00:00:00+05:30');

// ============ STATE ============
const LS = 'kea4';
let S = {lang:'kn',done:{},tp:{},scores:[],ppToday:0,ppDate:null};
let quizState = null;
let ppTimer = null;

try{let r=localStorage.getItem(LS);if(r){let d=JSON.parse(r);Object.assign(S,d)};let td=(new Date()).toISOString().slice(0,10);if(S.ppDate!==td){S.ppToday=0;S.ppDate=td}}catch(e){}

function save(){try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){}}
function L(){return S.lang}
function T(kn,en){return L()==='kn'?kn:en}
function cd(){return Math.max(0,Math.ceil((EXAM_DATE-new Date())/(86400000)))}
function todayDay(){let d=Object.keys(S.done||{}).length;return Math.min(d+1,16)}
function toast(m){let c=document.getElementById('toastFix');let e=document.createElement('div');e.className='toast-msg';e.textContent=m;c.appendChild(e);setTimeout(function(){e.remove()},2200)}
function toggleLang(){S.lang=S.lang==='kn'?'en':'kn';document.documentElement.setAttribute('data-lang',S.lang);save();nav(currentNav);toast(T('✅ Kannada','✅ English'))}

// ============ NAVIGATION ============
let currentNav = 'home';
function nav(view){
  currentNav = view;
  document.querySelectorAll('.bnav button').forEach(function(b){b.classList.remove('on')});
  var btn = document.getElementById('bn'+view.charAt(0).toUpperCase()+view.slice(1));
  if(btn)btn.classList.add('on');
  var m = document.getElementById('main');
  if(view==='home')showHome(m);
  else if(view==='plan')showPlan(m);
  else if(view==='quiz')showQuiz(m);
  else if(view==='topics')showTopics(m);
  else if(view==='news')showNews(m);
  m.scrollTop = 0;
  updateCD();
}

// ============ COUNTDOWN ============
function updateCD(){
  document.getElementById('cdBadge').textContent = '📅 '+cd()+' '+(L()==='kn'?'ದಿನ':'days');
}
setInterval(updateCD,60000);

// ============ DATA ============
var PLAN = [
  {d:1,kn:'ಸಂವಿಧಾನ - ಪೀಠಿಕೆ, ಮೂಲ ಹಕ್ಕುಗಳು',en:'Constitution - Preamble, FRs',ts:['c1','c2']},
  {d:2,kn:'ಸಂವಿಧಾನ - DPSP, ತಿದ್ದುಪಡಿ, ನ್ಯಾಯಾಂಗ',en:'Constitution - DPSP, Amendments, Judiciary',ts:['c3','c4','c5']},
  {d:3,kn:'ಭಾರತ ಇತಿಹಾಸ - ಪ್ರಾಚೀನ & ಮಧ್ಯಕಾಲೀನ',en:'Indian History - Ancient & Medieval',ts:['h1','h2']},
  {d:4,kn:'ಕರ್ನಾಟಕ ಇತಿಹಾಸ - ಕದಂಬರಿಂದ ವಿಜಯನಗರ',en:'Karnataka History - Kadamba to Vijayanagara',ts:['h3','h4']},
  {d:5,kn:'ಆಧುನಿಕ ಭಾರತ, ಟಿಪ್ಪು, ಚೆನ್ನಮ್ಮ',en:'Modern India, Tipu, Chennamma',ts:['h5','h6','h7']},
  {d:6,kn:'ಭಾರತ ಭೂಗೋಳ - ಭೌತಿಕ, ನದಿಗಳು',en:'India Geography - Physical, Rivers',ts:['g1','g2']},
  {d:7,kn:'ಕರ್ನಾಟಕ ಭೂಗೋಳ - ನದಿ, ಜಿಲ್ಲೆ, ಹವಾಮಾನ',en:'KA Geography - Rivers, Districts, Climate',ts:['g3','g4','g5']},
  {d:8,kn:'ಆಡಳಿತ - ರಾಜ್ಯ, ಪ್ರಾದೇಶಿಕ, VA ಪಾತ್ರ',en:'Administration - State, Territory, VA Role',ts:['a1','a2']},
  {d:9,kn:'ಪಂಚಾಯತ್ ರಾಜ್, ಗ್ರಾಮೀಣಾಭಿವೃದ್ಧಿ, ಸಹಕಾರ',en:'Panchayat Raj, Rural Dev, Cooperatives',ts:['r1','r2','r3']},
  {d:10,kn:'ಕರ್ನಾಟಕ ಆರ್ಥಿಕತೆ, ಸರ್ಕಾರಿ ಯೋಜನೆಗಳು',en:'KA Economy, Govt Schemes',ts:['e1','e2']},
  {d:11,kn:'ಪರಿಸರ, ಜೀವವೈವಿಧ್ಯ',en:'Environment, Biodiversity',ts:['env1','env2']},
  {d:12,kn:'ಪ್ರಚಲಿತ ಘಟನೆಗಳು',en:'Current Affairs',ts:['ca1']},
  {d:13,kn:'ಕನ್ನಡ - ವ್ಯಾಕರಣ, ಶಬ್ದಕೋಶ, ಗಾದೆ',en:'Kannada - Grammar, Vocab, Proverbs',ts:['k1','k2','k3']},
  {d:14,kn:'ಕನ್ನಡ - ಗ್ರಹಿಕೆ, ಅನುವಾದ',en:'Kannada - Comprehension, Translation',ts:['k4','k5']},
  {d:15,kn:'ಇಂಗ್ಲಿಷ್ - ವ್ಯಾಕರಣ, ದೋಷ, Idioms',en:'English - Grammar, Errors, Idioms',ts:['en1','en2','en3','en4']},
  {d:16,kn:'ಕಂಪ್ಯೂಟರ್ - ಮೂಲ, MS Office, ಇಂಟರ್ನೆಟ್',en:'Computer - Basics, MS Office, Internet',ts:['comp1','comp2','comp3','comp4']}
];

var TOPICS = {
c1:{kn:'ಸಂವಿಧಾನದ ಪೀಠಿಕೆ',en:'Constitution Preamble',lkn:'📜 ಭಾರತದ ಸಂವಿಧಾನ: ನ.26,1949 ಅಂಗೀಕಾರ; ಜ.26,1950 ಜಾರಿ.\nಪೀಠಿಕೆಯ ಪದಗಳು: ಸಾರ್ವಭೌಮ, ಸಮಾಜವಾದಿ(42ನೇ), ಜಾತ್ಯತೀತ(42ನೇ), ಪ್ರಜಾಸತ್ತಾತ್ಮಕ, ಗಣರಾಜ್ಯ.\nಉದ್ದೇಶ: ನ್ಯಾಯ, ಸ್ವಾತಂತ್ರ್ಯ, ಸಮಾನತೆ, ಭ್ರಾತೃತ್ವ.\nಸಂವಿಧಾನ ಸಭೆ: ಡಾ.ರಾಜೇಂದ್ರ ಪ್ರಸಾದ್. ಕರಡು: ಡಾ.ಅಂಬೇಡ್ಕರ್. ಸಮಯ: 2ವ 11ತಿ 18ದಿ.\nಕೇಶವಾನಂದ ಭಾರತಿ(1973): ಪೀಠಿಕೆ ಸಂವಿಧಾನದ ಭಾಗ. ಮೂಲ: 22 ಭಾಗ, 395 ಅನುಚ್ಛೇದ.',len:'📜 Indian Constitution: Adopted Nov 26,1949; Effective Jan 26,1950.\nPreamble words: Sovereign, Socialist(42nd), Secular(42nd), Democratic, Republic.\nObjectives: Justice, Liberty, Equality, Fraternity.\nCA President: Dr.Rajendra Prasad. Drafting: Dr.Ambedkar. Time: 2yr 11mo 18d.\nKeshavananda Bharati(1973): Preamble is part of Constitution. Original: 22 Parts, 395 Articles.'},
c2:{kn:'ಮೂಲಭೂತ ಹಕ್ಕುಗಳು (ಅನು.12-35)',en:'Fundamental Rights (Art 12-35)',lkn:'⚖️ 6 ಮೂಲಭೂತ ಹಕ್ಕುಗಳು:\n1. ಸಮಾನತೆ(14-18): ಕಾನೂನಿನ ಮುಂದೆ ಸಮಾನತೆ, ಅಸ್ಪೃಶ್ಯತೆ ನಿರ್ಮೂಲನೆ.\n2. ಸ್ವಾತಂತ್ರ್ಯ(19-22): 6 ಸ್ವಾತಂತ್ರ್ಯಗಳು - ಭಾಷಣ, ಸಭೆ, ಸಂಘ, ಚಲನೆ, ವಾಸ, ವೃತ್ತಿ.\n3. ಶೋಷಣೆ ವಿರುದ್ಧ(23-24): ಬಾಲಕಾರ್ಮಿಕ ನಿಷೇಧ(<14 ವರ್ಷ).\n4. ಧಾರ್ಮಿಕ ಸ್ವಾತಂತ್ರ್ಯ(25-28).\n5. ಸಾಂಸ್ಕೃತಿಕ & ಶೈಕ್ಷಣಿಕ(29-30): ಅಲ್ಪಸಂಖ್ಯಾತರ ಹಕ್ಕು.\n6. ಸಾಂವಿಧಾನಿಕ ಪರಿಹಾರ(32): ಸಂವಿಧಾನದ ಹೃದಯ - ಡಾ.ಅಂಬೇಡ್ಕರ್.\nಆಸ್ತಿ ಹಕ್ಕು → 44ನೇ ತಿದ್ದುಪಡಿ(1978)→ಕಾನೂನು ಹಕ್ಕು(300A).',len:'⚖️ 6 Fundamental Rights:\n1. Equality(14-18): Equality before law, abolition of untouchability.\n2. Freedom(19-22): 6 freedoms - speech, assembly, association, movement, residence, profession.\n3. Against Exploitation(23-24): Child labour prohibited(<14 yrs).\n4. Religion(25-28).\n5. Cultural & Educational(29-30): Minority rights.\n6. Constitutional Remedies(32): Heart of Constitution - Dr.Ambedkar.\nRight to Property → 44th Amendment(1978)→Legal right(300A).'},
c3:{kn:'DPSP & ತಿದ್ದುಪಡಿಗಳು',en:'DPSP & Amendments',lkn:'📋 DPSP(ಅನು.36-51): ಐರ್ಲೆಂಡ್‌ನಿಂದ ಪ್ರೇರಿತ. ನ್ಯಾಯಬದ್ಧವಲ್ಲ.\nಪ್ರಮುಖ: ಅನು.38-ಕಲ್ಯಾಣ, 39A-ಕಾನೂನು ನೆರವು, 40-ಪಂಚಾಯತ್, 44-UCC, 48-ಗೋಹತ್ಯೆ.\n📝 ಪ್ರಮುಖ ತಿದ್ದುಪಡಿಗಳು:\n1ನೇ(1951)-ಭಾಷಣ | 7ನೇ(1956)-ರಾಜ್ಯ ಪುನರ್ರಚನೆ | 42ನೇ(1976)-ಮಿನಿ ಸಂವಿಧಾನ | 44ನೇ(1978)-ಆಸ್ತಿ\n52ನೇ(1985)-ಪಕ್ಷಾಂತರ | 61ನೇ(1989)-ಮತ 21→18 | 73ನೇ(1992)-ಪಂಚಾಯತ್ ರಾಜ್\n86ನೇ(2002)-ಶಿಕ್ಷಣ(21A) | 101ನೇ(2016)-GST | 106ನೇ(2023)-ಮಹಿಳಾ ಮೀಸಲಾತಿ',len:'📋 DPSP(Art 36-51): Inspired by Ireland. Non-justiciable.\nKey: Art 38-Welfare, 39A-Legal aid, 40-Panchayats, 44-UCC, 48-Cow ban.\n📝 Key Amendments: 1st(1951), 7th(1956), 42nd(1976)-Mini, 44th(1978), 52nd(1985), 61st(1989), 73rd(1992), 86th(2002), 101st(2016)-GST, 106th(2023).'},
c4:{kn:'ನ್ಯಾಯಾಂಗ',en:'Judiciary',lkn:'⚖️ ಸರ್ವೋಚ್ಚ ನ್ಯಾಯಾಲಯ(ಅನು.124-147): CJI+33 ನ್ಯಾಯಮೂರ್ತಿ. ನಿವೃತ್ತಿ:65.\nರಿಟ್‌ಗಳು: ಹೇಬಿಯಸ್ ಕಾರ್ಪಸ್, ಮ್ಯಾಂಡಮಸ್, ಪ್ರೊಹಿಬಿಷನ್, ಕ್ವೊ-ವಾರಂಟೊ, ಸೆರ್ಶಿಯೊರಾರಿ.\nಉಚ್ಚ ನ್ಯಾಯಾಲಯ(ಅನು.214-231): 25 HC. ನಿವೃತ್ತಿ:62.\nಕರ್ನಾಟಕ HC: 1884(ಮೈಸೂರು). ಪೀಠ: ಬೆಂಗಳೂರು, ಧಾರವಾಡ, ಕಲಬುರಗಿ.',len:'⚖️ Supreme Court(Art 124-147): CJI+33 judges. Retire:65.\nWrits: Habeas Corpus, Mandamus, Prohibition, Quo-Warranto, Certiorari.\nHigh Courts(Art 214-231): 25 HCs. Retire:62.\nKarnataka HC: 1884(Mysore). Benches: Bengaluru, Dharwad, Kalaburagi.'},
c5:{kn:'ರಾಜ್ಯ ಸರ್ಕಾರ',en:'State Government',lkn:'🏛️ ರಾಜ್ಯಪಾಲ(ಅನು.153-162): ರಾಷ್ಟ್ರಪತಿಯಿಂದ ನೇಮಕ, 5 ವರ್ಷ.\nಮುಖ್ಯಮಂತ್ರಿ(163-164): ಬಹುಮತ ಹೊಂದಿರಬೇಕು.\nಕರ್ನಾಟಕ: ವಿಧಾನಸಭೆ 224+1, ವಿಧಾನ ಪರಿಷತ್ 75.\nರಾಜ್ಯಪಾಲ: ಥಾವರ್ ಚಂದ್ ಗೆಹ್ಲೋಟ್. CM: ಸಿದ್ದರಾಮಯ್ಯ. DyCM: ಡಿ.ಕೆ.ಶಿವಕುಮಾರ್.',len:'🏛️ Governor(Art 153-162): Appointed by President, 5 years.\nCM(163-164): Must have majority.\nKarnataka: Assembly 224+1, Council 75.\nGovernor: T.C.Gehlot. CM: Siddaramaiah. DyCM: D.K.Shivakumar.'},
h1:{kn:'ಪ್ರಾಚೀನ ಭಾರತ',en:'Ancient India',lkn:'🏺 ಸಿಂಧೂ ಕಣಿವೆ(2500-1750 BCE): ಹರಪ್ಪಾ, ಮೊಹೆಂಜೊ-ದಾರೊ.\nವೇದಿಕ್ ಯುಗ(1500-600 BCE): 4 ವೇದಗಳು.\nಮೌರ್ಯ ಸಾಮ್ರಾಜ್ಯ(321-185 BCE): ಚಂದ್ರಗುಪ್ತ+ಚಾಣಕ್ಯ. ಅಶೋಕ: ಕಲಿಂಗ ಯುದ್ಧ(261 BCE)→ಬೌದ್ಧ ಧರ್ಮ.\nಕರ್ನಾಟಕದಲ್ಲಿ ಅಶೋಕನ ಶಾಸನ: ಮಸ್ಕಿ, ಬ್ರಹ್ಮಗಿರಿ, ಸಿದ್ಧಾಪುರ.\nಗುಪ್ತ ಸಾಮ್ರಾಜ್ಯ(320-550 CE): ಭಾರತದ ಸುವರ್ಣ ಯುಗ.',len:'🏺 Indus Valley(2500-1750 BCE): Harappa, Mohenjo-daro.\nVedic Age: 4 Vedas.\nMaurya Empire(321-185 BCE): Chandragupta+Chanakya. Ashoka: Kalinga(261 BCE)→Buddhism.\nKA Ashokan edicts: Maski, Brahmagiri, Siddapura.\nGupta Empire(320-550 CE): Golden Age of India.'},
h2:{kn:'ಮಧ್ಯಕಾಲೀನ ಭಾರತ',en:'Medieval India',lkn:'🏰 ದೆಹಲಿ ಸುಲ್ತಾನ(1206-1526): ಗುಲಾಮ, ಖಿಲ್ಜಿ, ತುಘಲಕ್, ಸಯ್ಯದ್, ಲೋದಿ.\nಮೊಘಲ್(1526-1857): ಬಾಬರ್-ಪಾನಿಪತ್-1(1526). ಅಕ್ಬರ್-ದಿನ್-ಇ-ಇಲಾಹಿ, ಮನ್ಸಬ್ದಾರಿ.\nಶಹಜಹಾನ್-ತಾಜ್ ಮಹಲ್. ಔರಂಗಜೇಬ್-ಜಿಜಿಯಾ.',len:'🏰 Delhi Sultanate(1206-1526): Slave, Khilji, Tughlaq, Sayyid, Lodi.\nMughals(1526-1857): Babur-Panipat-1(1526). Akbar-Din-i-Ilahi, Mansabdari.\nShah Jahan-Taj Mahal. Aurangzeb-Jizya.'},
h3:{kn:'ಪ್ರಾಚೀನ ಕರ್ನಾಟಕ',en:'Ancient Karnataka',lkn:'🏛️ ಕದಂಬರು(345-540): ಮೊದಲ ಕನ್ನಡ ರಾಜವಂಶ. ಮಯೂರಶರ್ಮ. ರಾಜಧಾನಿ: ಬನವಾಸಿ. ಹಲ್ಮಿಡಿ ಶಾಸನ(450 CE).\nಗಂಗರು(350-1000): ತಲಕಾಡು. ಗೊಮ್ಮಟೇಶ್ವರ.\nಬಾದಾಮಿ ಚಾಲುಕ್ಯ(543-757): ಪುಲಕೇಶಿ II-ಹರ್ಷನನ್ನು ಸೋಲಿಸಿದ(618). ಐಹೊಳೆ ಶಾಸನ.\nರಾಷ್ಟ್ರಕೂಟ(753-982): ಎಲ್ಲೋರಾ ಕೈಲಾಸನಾಥ. ಅಮೋಘವರ್ಷ-ಕವಿರಾಜಮಾರ್ಗ(ಮೊದಲ ಕನ್ನಡ ಗ್ರಂಥ).',len:'🏛️ Kadambas(345-540): First Kannada dynasty. Mayurasharma. Capital: Banavasi. Halmidi inscription(450 CE).\nGangas(350-1000): Talakadu. Gommateshwara.\nBadami Chalukyas(543-757): Pulakeshi II-defeated Harsha(618). Aihole inscription.\nRashtrakutas(753-982): Ellora Kailasanatha. Amoghavarsha-Kavirajamarga(first Kannada text).'},
h4:{kn:'ಮಧ್ಯಕಾಲೀನ ಕರ್ನಾಟಕ',en:'Medieval Karnataka',lkn:'🏯 ಹೊಯ್ಸಳ(1000-1346): ಬೇಲೂರು, ಹಳೇಬೀಡು. ವಿಶ್ವವಿಖ್ಯಾತ ಶಿಲ್ಪ.\nವಿಜಯನಗರ(1336-1646): ಹರಿಹರ&ಬುಕ್ಕ, ಹಂಪಿ. ಕೃಷ್ಣದೇವರಾಯ(1509-1529): ಸುವರ್ಣ ಯುಗ, ಅಷ್ಟದಿಗ್ಗಜರು.\nತಾಳೀಕೋಟೆ ಯುದ್ಧ(1565): ವಿಜಯನಗರ ಪತನ. ಹಂಪಿ UNESCO.\nಬಹಮನಿ(1347-1527): ಗುಲ್ಬರ್ಗಾ→ಬೀದರ್. ಮೈಸೂರು: ಒಡೆಯರ್, ಹೈದರ್&ಟಿಪ್ಪು.',len:'🏯 Hoysalas(1000-1346): Belur, Halebidu.\nVijayanagara(1336-1646): Harihara&Bukka, Hampi. Krishnadevaraya(1509-1529): Golden Age.\nBattle of Talikota(1565). Hampi UNESCO.\nBahmani(1347-1527): Gulbarga→Bidar. Mysore: Wodeyars, Hyder&Tipu.'},
h5:{kn:'ಟಿಪ್ಪು & ಚೆನ್ನಮ್ಮ',en:'Tipu & Chennamma',lkn:'🐅 ಟಿಪ್ಪು ಸುಲ್ತಾನ್(1750-1799): ಮೈಸೂರಿನ ಹುಲಿ. 4 ಆಂಗ್ಲೋ-ಮೈಸೂರು ಯುದ್ಧ. ರಾಕೆಟ್ ತಂತ್ರಜ್ಞಾನ. ಶ್ರೀರಂಗಪಟ್ಟಣದಲ್ಲಿ ಮರಣ(1799).\n👑 ಕಿತ್ತೂರು ಚೆನ್ನಮ್ಮ(1778-1829): 1824 ಬ್ರಿಟಿಷರ ವಿರುದ್ಧ ದಂಗೆ. ಸಂಗೊಳ್ಳಿ ರಾಯಣ್ಣ ಸೇನಾಪತಿ.\n🗺️ ಏಕೀಕರಣ: ಆಲೂರು ವೆಂಕಟರಾಯ. 1956-ಮೈಸೂರು ರಾಜ್ಯ. 1973-ಕರ್ನಾಟಕ. ರಾಜ್ಯೋತ್ಸವ: ನ.1.',len:'🐅 Tipu Sultan(1750-1799): Tiger of Mysore. 4 Anglo-Mysore Wars. Rocket tech. Died at Srirangapatna(1799).\n👑 Kittur Chennamma(1778-1829): 1824 revolt. Sangolli Rayanna.\n🗺️ Unification: Aluru Venkataraya. 1956-Mysore. 1973-Karnataka. Rajyotsava: Nov 1.'},
h6:{kn:'ಆಧುನಿಕ ಭಾರತ',en:'Modern India',lkn:'🇮🇳 INC ಸ್ಥಾಪನೆ: 1885(A.O.ಹ್ಯೂಮ್). ಮೊದಲ ಅಧ್ಯಕ್ಷ: W.C.ಬ್ಯಾನರ್ಜಿ.\nಬಂಗಾಳ ವಿಭಜನೆ(1905)→ಸ್ವದೇಶಿ. ಜಲಿಯನ್‌ವಾಲಾ ಬಾಗ್(ಏ.13,1919).\nಅಸಹಕಾರ ಚಳುವಳಿ(1920-22). ದಂಡಿ ಮಾರ್ಚ್(ಮಾ.12,1930).\nಭಾರತ ಬಿಟ್ಟು ತೊಲಗಿ(ಆ.8,1942). ಸ್ವಾತಂತ್ರ್ಯ: ಆ.15,1947.',len:'🇮🇳 INC founded: 1885(A.O.Hume). 1st President: W.C.Banerjee.\nBengal Partition(1905)→Swadeshi. Jallianwala Bagh(Apr 13,1919).\nNon-Cooperation(1920-22). Dandi March(Mar 12,1930).\nQuit India(Aug 8,1942). Independence: Aug 15,1947.'},
h7:{kn:'ಕರ್ನಾಟಕ ಏಕೀಕರಣ',en:'KA Unification',lkn:'🗺️ ಏಕೀಕರಣ ಪಿತಾಮಹ: ಆಲೂರು ವೆಂಕಟರಾಯ. 1956: ಮೈಸೂರು. 1973: ಕರ್ನಾಟಕ(ದೇವರಾಜ ಅರಸು).\nಐತಿಹಾಸಿಕ ಸ್ಥಳಗಳು: ಹಂಪಿ, ಪಟ್ಟದಕಲ್ಲು, ಬಾದಾಮಿ, ಶ್ರವಣಬೆಳಗೊಳ, ಬೇಲೂರು, ಹಳೇಬೀಡು, ಮೈಸೂರು ಅರಮನೆ, ಗೋಲ್ ಗುಂಬಜ್.',len:'🗺️ Father: Aluru Venkataraya. 1956: Mysore. 1973: Karnataka(Devaraj Urs).\nSites: Hampi, Pattadakallu, Badami, Shravanabelagola, Belur, Halebidu, Mysore Palace, Gol Gumbaz.'},
g1:{kn:'ಭಾರತ ಭೌತಿಕ ಲಕ್ಷಣ',en:'India Physical',lkn:'🗺️ 6 ವಿಭಾಗ: ಹಿಮಾಲಯ(ಹಿಮಾದ್ರಿ,ಹಿಮಾಚಲ,ಶಿವಾಲಿಕ್), ಉತ್ತರ ಮೈದಾನ, ಪ್ರಸ್ಥಭೂಮಿ(ದಖನ್), ಕರಾವಳಿ, ಥಾರ್, ದ್ವೀಪ.\nಪರ್ವತ: ಅರಾವಳಿ(ಅತ್ಯಂತ ಪ್ರಾಚೀನ), ಪ.ಘಟ್ಟ(UNESCO), ಪೂ.ಘಟ್ಟ, ವಿಂಧ್ಯ, ಸಾತ್‌ಪುರಾ.',len:'🗺️ 6 Divisions: Himalayas(3 ranges), N.Plains, Plateau(Deccan), Coastal, Thar, Islands.\nMountains: Aravalli(oldest), W.Ghats(UNESCO), E.Ghats, Vindhya, Satpura.'},
g2:{kn:'ಭಾರತದ ನದಿಗಳು',en:'Indian Rivers',lkn:'🌊 ಹಿಮಾಲಯ(ಶಾಶ್ವತ): ಸಿಂಧೂ, ಗಂಗಾ, ಯಮುನಾ, ಬ್ರಹ್ಮಪುತ್ರ.\nಪರ್ಯಾಯದ್ವೀಪ(ಮಳೆಯಾಧಾರಿತ): ಪೂರ್ವ-ಗೋದಾವರಿ(ದಕ್ಷಿಣ ಗಂಗಾ), ಕೃಷ್ಣಾ, ಕಾವೇರಿ, ಮಹಾನದಿ.\nಪಶ್ಚಿಮ-ನರ್ಮದಾ, ತಾಪ್ತಿ(ಭ್ರಂಶ ಕಣಿವೆ). ಜಲಪಾತ: ಜೋಗ(ಶರಾವತಿ-253m).',len:'🌊 Himalayan(Perennial): Indus, Ganga, Yamuna, Brahmaputra.\nPeninsular(Rain-fed): East-Godavari, Krishna, Kaveri, Mahanadi. West-Narmada, Tapti(rift).\nFalls: Jog(Sharavati-253m).'},
g3:{kn:'ಕರ್ನಾಟಕ ನದಿಗಳು',en:'KA Rivers',lkn:'🌊 ಕಾವೇರಿ: ತಲಕಾವೇರಿ(ಕೊಡಗು), 805km. KRS, ಕಬಿನಿ, ಹಾರಂಗಿ.\nಕೃಷ್ಣಾ: ಮಹಾಬಲೇಶ್ವರ. ಉಪನದಿ-ಘಟಪ್ರಭಾ,ಮಲಪ್ರಭಾ,ತುಂಗಭದ್ರಾ,ಭೀಮಾ. ಆಲಮಟ್ಟಿ.\nತುಂಗಭದ್ರಾ: TB ಅಣೆಕಟ್ಟು(ಹಂಪಿ). ಶರಾವತಿ: ಜೋಗ(253m). ಕಾಳಿ, ನೇತ್ರಾವತಿ.',len:'🌊 Kaveri: Talakaveri(Kodagu), 805km. KRS, Kabini, Harangi.\nKrishna: Mahabaleshwar. Trib: Ghataprabha,Malaprabha,Tungabhadra,Bhima. Almatti.\nTungabhadra: TB Dam(Hampi). Sharavati: Jog(253m). Kali, Netravati.'},
g4:{kn:'ಕರ್ನಾಟಕ ಜಿಲ್ಲೆಗಳು',en:'KA Districts',lkn:'🏙️ 31 ಜಿಲ್ಲೆ, 4 ವಿಭಾಗ:\nಬೆಂಗಳೂರು(9): ತುಮಕೂರು, ಚಿತ್ರದುರ್ಗ, ಶಿವಮೊಗ್ಗ ಸೇರಿ.\nಮೈಸೂರು(8): ಮೈಸೂರು, ಮಂಡ್ಯ, ಕೊಡಗು ಸೇರಿ.\nಬೆಳಗಾವಿ(7): ಬೆಳಗಾವಿ, ಧಾರವಾಡ, ಉ.ಕನ್ನಡ ಸೇರಿ.\nಕಲಬುರಗಿ(7): ಕಲಬುರಗಿ, ಬೀದರ್, ಬಳ್ಳಾರಿ ಸೇರಿ.\nವಿಸ್ತೀರ್ಣ: 1,91,791km²(8ನೇ). ರಾಜಧಾನಿ: ಬೆಂಗಳೂರು. ಹೊಸ: ವಿಜಯನಗರ(2020).',len:'🏙️ 31 dist, 4 div: BLR(9), MYS(8), BGM(7), KLB(7).\nArea: 191,791km²(8th). Capital: Bengaluru. Newest: Vijayanagara(2020).'},
g5:{kn:'ಕರ್ನಾಟಕ ಹವಾಮಾನ',en:'KA Climate',lkn:'🌤️ ಉಷ್ಣವಲಯ ಮಾನ್ಸೂನ್. ಬೇಸಿಗೆ:25-40°C. ಮುಂಗಾರು:ಜೂನ್-ಸೆಪ್. ಚಳಿ:10-25°C.\nಮಳೆ: ಕರಾವಳಿ300-400cm, ಮಲೆನಾಡು200-300, ಉ.ಒಳನಾಡು50-70.\nಸಂಪನ್ಮೂಲ: ಚಿನ್ನ(KGF,ಹಟ್ಟಿ), ಕಬ್ಬಿಣ(ಬಳ್ಳಾರಿ), ಕಾಫಿ(70%+), ರೇಷ್ಮೆ(ಮೈಸೂರು).',len:'🌤️ Tropical monsoon. Summer:25-40°C. Monsoon:Jun-Sep. Winter:10-25°C.\nRain: Coastal300-400cm, Malnad200-300, N.Interior50-70.\nResources: Gold(KGF,Hatti), Iron(Ballari), Coffee(70%+), Silk(Mysuru).'},
a1:{kn:'ರಾಜ್ಯ ಆಡಳಿತ',en:'State Administration',lkn:'🏛️ ರಾಜ್ಯಪಾಲ: ರಾಷ್ಟ್ರಪತಿ ನೇಮಕ, 5ವ. CM: ಬಹುಮತ.\nKA: 224+1 ವಿಧಾನಸಭೆ, 75 ಪರಿಷತ್. ಗವರ್ನರ್: ಗೆಹ್ಲೋಟ್. CM: ಸಿದ್ದರಾಮಯ್ಯ.',len:'🏛️ Governor: President appoints, 5yr. CM: majority. KA: 224+1 Assembly, 75 Council.'},
a2:{kn:'ಪ್ರಾದೇಶಿಕ ಆಡಳಿತ & VA',en:'Territorial Admin & VA',lkn:'🏘️ 4 ವಿಭಾಗ, 31 ಜಿಲ್ಲೆ, 240+ ತಾಲ್ಲೂಕು. DC→ತಹಸೀಲ್ದಾರ್→VA.\nVA ಕರ್ತವ್ಯ: RTC/ಪಹಣಿ, ಉತಾರ, ಖಾತಾ, ಕಂದಾಯ ವಸೂಲಾತಿ, ಜನಗಣತಿ, ಭೂಮಿ ಯೋಜನೆ, ವಿಪತ್ತು ಪರಿಹಾರ.',len:'🏘️ 4 div, 31 dist, 240+ taluks. DC→Tahsildar→VA.\nVA duties: RTC/Pahani, mutation, khata, revenue, census, Bhoomi, disaster relief.'},
r1:{kn:'ಪಂಚಾಯತ್ ರಾಜ್',en:'Panchayat Raj',lkn:'🏘️ 73ನೇ ತಿದ್ದುಪಡಿ(1992): ಭಾಗ IX(243-243O). 3 ಹಂತ: ಗ್ರಾಮ→ತಾಲ್ಲೂಕು→ಜಿಲ್ಲಾ ಪಂಚಾಯತ್.\n5ವ ಚುನಾವಣೆ. 1/3 SC/ST/ಮಹಿಳೆ ಮೀಸಲಾತಿ. 29 ವಿಷಯ(11ನೇ ಅನುಸೂಚಿ). KA ಕಾಯ್ದೆ 1993.',len:'🏘️ 73rd Amendment(1992): Part IX. 3 tiers: Gram→Taluk→Zilla. 5yr elections. 1/3 reservation. 29 subjects(11th Schedule).'},
r2:{kn:'ಗ್ರಾಮೀಣಾಭಿವೃದ್ಧಿ',en:'Rural Development',lkn:'🌾 MGNREGA(100 ದಿನ). PMGSY. PM-KISAN(₹6000/ವ).\nKA 5 ಗ್ಯಾರಂಟಿ: ಶಕ್ತಿ(ಉಚಿತ ಬಸ್), ಗೃಹ ಜ್ಯೋತಿ(200 ಯೂ), ಗೃಹ ಲಕ್ಷ್ಮೀ(₹2000/ತಿ), ಅನ್ನ ಭಾಗ್ಯ(10kg ಅಕ್ಕಿ), ಯುವನಿಧಿ(ನಿರುದ್ಯೋಗ ಭತ್ಯೆ).',len:'🌾 MGNREGA(100 days). PM-KISAN(₹6000/yr).\nKA 5 Guarantees: Shakti(bus), Gruha Jyoti(200 units), Gruha Lakshmi(₹2000/mo), Anna Bhagya(10kg), Yuva Nidhi.'},

e1:{kn:'ಕರ್ನಾಟಕ ಆರ್ಥಿಕತೆ',en:'KA Economy',lkn:'💰 GSDP 4ನೇ. ಕೃಷಿ~13%, ಉದ್ಯಮ~25%, ಸೇವೆ~62%. IT(40% ರಫ್ತು), JSW, ಟೊಯೋಟಾ, HAL, ISRO. ಬಜೆಟ್ ~₹3.2 ಲಕ್ಷ ಕೋಟಿ.',len:'💰 GSDP 4th. Agri~13%, Ind~25%, Svc~62%. IT(40% exports), JSW, Toyota, HAL, ISRO. Budget ~₹3.2L Cr.'},

  var avg=nq>0?Math.round(S.scores.reduce(function(a,b){return a+(b.s/b.t)*100},0)/nq):0;
  var tp=null; for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===td){tp=PLAN[i];break}}
  var h='<div class="stats"><div class="stat"><div class="v">'+d+'/16</div><div class="l">'+T('ದಿನಗಳು','Days')+'</div></div>';
  h+='<div class="stat"><div class="v">'+nq+'</div><div class="l">'+T('ಕ್ವಿಜ್','Quizzes')+'</div></div>';
  h+='<div class="stat"><div class="v">'+avg+'%</div><div class="l">'+T('ಸರಾಸರಿ','Avg')+'</div></div>';
  h+='<div class="stat"><div class="v">'+cd()+'</div><div class="l">'+T('ಪರೀಕ್ಷೆಗೆ','To Exam')+'</div></div></div>';
  if(tp){h+='<div class="card" style="border-left:4px solid #d4782f"><h2>🎯 '+T('ದಿನ '+td,'Day '+td)+': '+T(tp.kn,tp.en)+'</h2>';
    h+='<button class="btn btn-p" onclick="studyDay('+td+')">📖 '+T('ಅಧ್ಯಯನ','Study')+'</button> ';
    h+='<button class="btn btn-g" onclick="quizDay('+td+')">📝 '+T('ಕ್ವಿಜ್','Quiz')+'</button> ';
    if(!S.done[td])h+='<button class="btn btn-o" onclick="markDone('+td+')">✓ '+T('ಮುಗಿದಿದೆ','Done')+'</button>';
    h+='</div>'}else if(d>=16){h+='<div class="card" style="border-left:4px solid #2e7d32"><h2>🎉 '+T('ಅಭಿನಂದನೆಗಳು!','Congratulations!')+'</h2><p>'+T('16 ದಿನ ಪೂರ್ಣ!','All 16 days done!')+'</p></div>'}
  h+='<div class="card"><h2>📊 '+T('ತ್ವರಿತ ಲಿಂಕ್','Quick Links')+'</h2>';
  h+='<button class="btn btn-o" onclick="nav(\'plan\')">📅 '+T('ಯೋಜನೆ','Plan')+'</button> ';
  h+='<button class="btn btn-o" onclick="mockTest()">🔥 '+T('ಮಾಕ್ ಟೆಸ್ಟ್','Mock Test')+'</button> ';
  h+='<button class="btn btn-o" onclick="nav(\'news\')">📰 '+T('ಸುದ್ದಿ','News')+'</button></div>';
  m.innerHTML = h;
}

// ============ RENDER: PLAN ============
function showPlan(m){
  var td=todayDay(); var h='<div class="card"><h2>📅 '+T('16-ದಿನ ಯೋಜನೆ','16-Day Plan')+'</h2><p style="font-size:.8rem;color:#9e8d78;margin-bottom:8px">'+T('60%+ ಕ್ವಿಜ್ = ಮುಂದಿನ ದಿನ','60%+ quiz = next day')+'</p><div class="day-grid">';
  for(var i=0;i<PLAN.length;i++){var p=PLAN[i],done=S.done[p.d],now=p.d===td,locked=p.d>td,c='';
    if(done)c='done';else if(now)c='now';else if(locked)c='lock';
    h+='<div class="day '+c+'" onclick="'+(!locked?'studyDay('+p.d+')':'')+'"><div class="dn">'+p.d+'</div><div class="dl">'+T(p.kn,p.en)+'</div>'+(done?'<span style="position:absolute;top:3px;right:5px;font-size:.65rem">✅</span>':'')+'</div>'}
  h+='</div></div>';
  m.innerHTML=h;
}

// ============ STUDY DAY ============
function studyDay(day){
  var p=null; for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===day){p=PLAN[i];break}}
  if(!p||day>todayDay()){toast(T('ಮೊದಲು ಹಿಂದಿನ ದಿನ ಮುಗಿಸಿ','Complete previous day first'));return}
  var h='<button class="x" onclick="closeLesson()">✕</button><h2>'+T('ದಿನ','Day')+' '+day+': '+T(p.kn,p.en)+'</h2><div class="lesson">';
  for(var i=0;i<p.ts.length;i++){
    var t=TOPICS[p.ts[i]]; if(!t)continue;
    h+='<h3>📌 '+T(t.kn,t.en)+'</h3>'+T(t.lkn,t.len)+'<hr style="border-color:#e5dccf;margin:10px 0">';
    if(!S.tp)S.tp={}; if(!S.tp[p.ts[i]])S.tp[p.ts[i]]={}; S.tp[p.ts[i]].read=true;
  }
  h+='</div><button class="btn btn-p" onclick="quizDay('+day+');closeLesson()">📝 '+T('ಕ್ವಿಜ್','Quiz')+'</button> ';
  if(!S.done[day])h+='<button class="btn btn-g" onclick="markDone('+day+');closeLesson()">✓ '+T('ಮುಗಿಸಿ','Done')+'</button> ';
  h+='<button class="btn btn-h" onclick="closeLesson()">'+T('ಮುಚ್ಚಿ','Close')+'</button>';
  document.getElementById('lessonBox').innerHTML=h;
  document.getElementById('lessonModal').classList.add('on');
  save();
}
function closeLesson(){document.getElementById('lessonModal').classList.remove('on')}
function markDone(day){S.done[day]=true;S.ppToday=0;save();nav('home');toast('🎉 '+T('ದಿನ '+day+' ಪೂರ್ಣ!','Day '+day+' done!'))}

// ============ TOPICS VIEW ============
function showTopics(m){
  var h=''; var subs=[
    {id:'constitution',kn:'ಸಂವಿಧಾನ',en:'Constitution',ts:['c1','c2','c3','c4','c5']},
    {id:'history',kn:'ಇತಿಹಾಸ',en:'History',ts:['h1','h2','h3','h4','h5','h6','h7']},
    {id:'geography',kn:'ಭೂಗೋಳ',en:'Geography',ts:['g1','g2','g3','g4','g5']},
    {id:'admin',kn:'ಆಡಳಿತ',en:'Administration',ts:['a1','a2']},
    {id:'rural',kn:'ಪಂಚಾಯತ್ ರಾಜ್',en:'Panchayat Raj',ts:['r1','r2','r3']},
    {id:'economy',kn:'ಆರ್ಥಿಕತೆ',en:'Economy',ts:['e1','e2']},
    {id:'environment',kn:'ಪರಿಸರ',en:'Environment',ts:['env1','env2']},
    {id:'kannada',kn:'ಕನ್ನಡ',en:'Kannada',ts:['k1','k2','k3','k4','k5']},
    {id:'english',kn:'ಇಂಗ್ಲಿಷ್',en:'English',ts:['en1','en2','en3','en4']},
    {id:'computer',kn:'ಕಂಪ್ಯೂಟರ್',en:'Computer',ts:['comp1','comp2','comp3','comp4']}
  ];
  for(var i=0;i<subs.length;i++){var s=subs[i];
    h+='<div class="card"><h2>'+T(s.kn,s.en)+'</h2>';
    for(var j=0;j<s.ts.length;j++){
      var t=TOPICS[s.ts[j]]; if(!t)continue;
      var tp=S.tp&&S.tp[s.ts[j]];
      h+='<div class="topic-btn" onclick="openTopic(\''+s.ts[j]+'\')"><span>'+(tp&&tp.read?'✅ ':'📖 ')+T(t.kn,t.en)+'</span><span style="font-size:.7rem;color:#9e8d78">'+(tp&&tp.qd?tp.qs+'%':'→')+'</span></div>';
    }
    h+='</div>';
  }
  m.innerHTML=h;
}
function openTopic(tid){
  var t=TOPICS[tid]; if(!t)return;
  if(!S.tp)S.tp={}; if(!S.tp[tid])S.tp[tid]={}; S.tp[tid].read=true; save();
  var h='<button class="x" onclick="closeLesson()">✕</button><h2>'+T(t.kn,t.en)+'</h2><div class="lesson">'+T(t.lkn,t.len)+'</div>';
  h+='<button class="btn btn-p" style="margin-top:10px" onclick="quizTopic(\''+tid+'\');closeLesson()">📝 '+T('ಕ್ವಿಜ್','Quiz')+'</button> ';
  h+='<button class="btn btn-h" onclick="closeLesson()">'+T('ಮುಚ್ಚಿ','Close')+'</button>';
  document.getElementById('lessonBox').innerHTML=h;
  document.getElementById('lessonModal').classList.add('on');
}

// ============ NEWS ============
function showNews(m){
  var h='<div class="card"><h2>📰 '+T('ಪ್ರಚಲಿತ ಘಟನೆಗಳು','Current Affairs')+'</h2></div>';
  for(var i=0;i<CA_NEWS.length;i++){var n=CA_NEWS[i];
    h+='<div class="nw"><span class="nd">'+n.d+'</span> <span class="tag '+n.tg+'">'+n.tg+'</span><div class="nt">'+T(n.kn,n.en)+'</div><div class="nb">'+T(n.dk,n.de)+'</div></div>'}
  m.innerHTML=h;
}

// ============ QUIZ ============
function showQuiz(m){
  if(quizState){showQQ(m);return}
  var td=todayDay();
  m.innerHTML='<div class="card"><h2>📝 '+T('ಕ್ವಿಜ್','Quiz')+'</h2>';
  m.innerHTML+='<button class="btn btn-p" onclick="quizDay('+td+')">🎯 '+T('ಇಂದಿನ ಕ್ವಿಜ್','Today Quiz')+'</button> ';
  m.innerHTML+='<button class="btn btn-o" onclick="mockTest()">🔥 '+T('ಮಾಕ್ ಟೆಸ್ಟ್','Mock Test')+'</button>';
  m.innerHTML+='</div>';
}
function quizDay(day){
  var p=null; for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===day){p=PLAN[i];break}}
  if(p)startQuiz(p.ts,T('ದಿನ '+day,'Day '+day),day);
}
function quizTopic(tid){startQuiz([tid],T(TOPICS[tid].kn,TOPICS[tid].en),null)}
function mockTest(){
  var all=[]; for(var k in TOPICS)all.push(k);
  all.sort(function(){return Math.random()-0.5});
  startQuiz(all.slice(0,20),T('ಮಾಕ್ ಟೆಸ್ಟ್','Mock Test'),null);
}
function startQuiz(ids,title,day){
  var qs=[];
  for(var i=0;i<ids.length;i++){
    if(QBANK[ids[i]])for(var j=0;j<QBANK[ids[i]].length;j++)qs.push({q:QBANK[ids[i]][j],tid:ids[i]})
  }
  if(qs.length===0){toast(T('ಪ್ರಶ್ನೆಗಳಿಲ್ಲ','No questions'));return}
  qs.sort(function(){return Math.random()-0.5});
  qs=qs.slice(0,Math.min(25,qs.length));
  quizState={title:title,qs:qs,idx:0,score:0,ans:[],tids:ids,day:day};
  showQQ(document.getElementById('main'));
}
function showQQ(m){
  var qs=quizState,qobj=qs.qs[qs.idx],last=qs.idx===qs.qs.length-1;
  var pct=qs.idx/qs.qs.length*100,aw=qs.ans[qs.idx]!==undefined;
  var isKn=L()==='kn'; var qt=isKn?qobj.q.q:qobj.q.qe;
  var opts=isKn?qobj.q.o:qobj.q.oe;
  var h='<div class="card"><div class="qp"><div class="qpf" style="width:'+pct+'%"></div></div>';
  h+='<h2>📝 '+qs.title+'</h2><p style="font-size:.8rem;color:#9e8d78">'+T('ಪ್ರಶ್ನೆ','Q')+' '+(qs.idx+1)+'/'+qs.qs.length+' | '+T('ಸ್ಕೋರ್','Score')+': '+qs.score+'</p>';
  h+='<div class="qq">'+qt+'</div>';
  for(var i=0;i<opts.length;i++){
    var c='qo'; if(aw){if(i===qobj.q.a)c+=' correct';if(i===qs.ans[qs.idx]&&i!==qobj.q.a)c+=' wrong'}
    h+='<button class="'+c+'" onclick="answerQuiz('+i+')" '+(aw?'disabled':'')+'>'+String.fromCharCode(65+i)+'. '+opts[i]+'</button>';
  }
  h+='<div style="margin-top:10px">';
  if(aw&&!last)h+='<button class="btn btn-p" onclick="nextQuiz()">'+T('ಮುಂದಿನ','Next')+' →</button> ';
  if(aw&&last)h+='<button class="btn btn-g" onclick="finishQuiz()">🏆 '+T('ಫಲಿತಾಂಶ','Result')+'</button> ';
  h+='<button class="btn btn-h" onclick="cancelQuiz()">'+T('ರದ್ದು','Cancel')+'</button></div></div>';
  m.innerHTML=h;
}
function answerQuiz(i){
  if(!quizState||quizState.ans[quizState.idx]!==undefined)return;
  var q=quizState.qs[quizState.idx];
  quizState.ans[quizState.idx]=i; if(i===q.q.a)quizState.score++;
  save(); showQQ(document.getElementById('main'));
}
function nextQuiz(){if(!quizState)return;quizState.idx++;showQQ(document.getElementById('main'))}
function cancelQuiz(){quizState=null;nav('quiz')}
function finishQuiz(){
  if(!quizState)return;
  var qs=quizState,t=qs.qs.length,s=qs.score,pct=Math.round(s/t*100),pass=pct>=60;
  for(var i=0;i<qs.tids.length;i++){
    if(!S.tp)S.tp={}; if(!S.tp[qs.tids[i]])S.tp[qs.tids[i]]={};
    S.tp[qs.tids[i]].qd=true; S.tp[qs.tids[i]].qs=pct;
  }
  if(!S.scores)S.scores=[]; S.scores.push({s:s,t:t});
  if(pass&&qs.day&&qs.day===todayDay()&&!S.done[qs.day]){S.done[qs.day]=true;S.ppToday=0}
  save();
  var em=pct>=80?'🎉':pct>=60?'👍':pct>=40?'📚':'💪';
  var m=document.getElementById('main');
  m.innerHTML='<div class="card" style="text-align:center"><div style="font-size:3rem;margin-bottom:8px">'+em+'</div><div style="font-size:2rem;font-weight:800;color:#d4782f">'+s+'/'+t+'</div><p style="color:#9e8d78;margin:8px 0">'+pct+'% — '+(pass?T('✅ ಉತ್ತೀರ್ಣ!','✅ Passed!'):T('❌ 60%+ ಬೇಕು','❌ Need 60%+'))+'</p>';
  m.innerHTML+='<button class="btn btn-p" onclick="quizDay('+todayDay()+')">🔄 '+T('ಮರುಪ್ರಯತ್ನ','Retry')+'</button> ';
  m.innerHTML+='<button class="btn btn-o" onclick="nav(\'plan\')">📅 '+T('ಯೋಜನೆ','Plan')+'</button> ';
  m.innerHTML+='<button class="btn btn-o" onclick="cancelQuiz();nav(\'quiz\')">📋 '+T('ಬೇರೆ ಕ್ವಿಜ್','More')+'</button></div>';
  quizState=null;
}

// ============ FORCE LEARNING ============
function checkForce(){
  var td=(new Date()).toISOString().slice(0,10);
  if(S.ppDate!==td){S.ppToday=0;S.ppDate=td;save()}
  if(quizState)return;
  var cd=todayDay(); if(cd>16||S.done[cd])return;
  var h=(new Date()).getHours();
  if([9,14,19,22].indexOf(h)===-1)return;
  if(S.ppToday>=3)return;
  
  var p=null; for(var i=0;i<PLAN.length;i++){if(PLAN[i].d===cd){p=PLAN[i];break}}
  if(!p)return;
  var fh='<div class="fi">⏰</div><h2>'+T('ಇಂದಿನ ಅಧ್ಯಯನ!','Study Time!')+'</h2>';
  fh+='<p><b>'+T('ದಿನ '+cd,'Day '+cd)+':</b> '+T(p.kn,p.en)+'<br>'+T('ಪ್ರತಿದಿನ ಅಧ್ಯಯನ ಮಾಡಿ!','Study every day!')+'</p>';
  fh+='<button class="btn btn-p" style="width:100%;justify-content:center;padding:10px;margin-bottom:6px" onclick="studyDay('+cd+');closeForce()">📖 '+T('ಅಧ್ಯಯನ','Study Now')+'</button>';
  var ppDisabled=S.ppToday>=2;
  fh+='<button class="btn btn-o" style="width:100%;justify-content:center" onclick="postpone()" '+(ppDisabled?'disabled':'')+'>⏳ '+T(ppDisabled?'ಮುಂದೂಡಲಾಗದು':'ಮುಂದೂಡಿ',ppDisabled?'Cannot postpone':'Postpone')+'</button>';
  if(S.ppToday>=2)fh+='<p style="color:#c62828;font-size:.7rem;margin-top:6px">⚠️ '+T('ಕೊನೆಯ ಅವಕಾಶ!','Last chance!')+'</p>';
  document.getElementById('forceBox').innerHTML=fh;
  document.getElementById('forceBg').classList.add('on');
}
function closeForce(){document.getElementById('forceBg').classList.remove('on')}
function postpone(){
  S.ppToday++; S.ppDate=(new Date()).toISOString().slice(0,10); save(); closeForce();
  var min=S.ppToday===1?120:60;
  toast('⏰ '+T(min+' ನಿಮಿಷ ನಂತರ','Reminder in '+min+' min'));
  if(ppTimer)clearTimeout(ppTimer);
  ppTimer=setTimeout(function(){if(!S.done[todayDay()])checkForce()},min*60000);
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded',function(){
  updateCD();
  nav('home');
  setInterval(checkForce,300000);
  checkForce();
  console.log('✅ KEA Prep App Ready! Exam: Oct 4, 2026');
});
</script>
